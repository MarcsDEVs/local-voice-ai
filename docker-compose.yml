services:
  livekit_agent:
    build:
      context: ./livekit_agent
    env_file:
      - .env
    environment:
      # LiveKit Configuration
      - LIVEKIT_URL=${LIVEKIT_URL:-ws://10.0.0.3:7880}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      
      # LLM Configuration (OpenAI-compatible)
      - LLAMA_BASE_URL=${LLAMA_BASE_URL:-http://10.0.0.3:8000/v1}
      - LLAMA_MODEL=${LLAMA_MODEL:-qwen3-4b}
      
      # STT Configuration (OpenAI-compatible)
      - STT_PROVIDER=${STT_PROVIDER:-nemotron}
      - STT_BASE_URL=${STT_BASE_URL:-http://10.0.0.3:8000/v1}
      - STT_MODEL=${STT_MODEL:-nemotron-speech-streaming}
      - STT_API_KEY=${STT_API_KEY:-no-key-needed}
      
      # TTS Configuration (OpenAI-compatible)
      - TTS_BASE_URL=${TTS_BASE_URL:-http://10.0.0.3:8880/v1}
      - TTS_MODEL=${TTS_MODEL:-kokoro}
      - TTS_VOICE=${TTS_VOICE:-af_nova}
      
      # Webhook for agent delegation
      - WEBHOOK_URL=${WEBHOOK_URL:-http://10.0.0.3:5678/webhook/AI-AGI}
      - WEBHOOK_ENABLED=${WEBHOOK_ENABLED:-true}
    
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/ > /dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    
    networks:
      - agent_network
    
    ports:
      - "8081:8081"

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_LIVEKIT_URL=${NEXT_PUBLIC_LIVEKIT_URL:-ws://localhost:7880}
      - LIVEKIT_URL=${LIVEKIT_URL:-ws://10.0.0.3:7880}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
    
    networks:
      - agent_network

networks:
  agent_network:
    driver: bridge
